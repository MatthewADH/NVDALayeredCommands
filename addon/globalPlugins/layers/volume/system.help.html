<!DOCTYPE html>
<html>
<body>

<h1>System Volume Help</h1>

<h2>Volume Commands</h2>
<table border="1">
    <tr>
        <th>Keystroke</th>
        <th>Description</th>
    </tr>
    <tr>
        <td>Up Arrow</td>
        <td>Increase volume by 2%</td>
    </tr>
    <tr>
        <td>Down Arrow</td>
        <td>Decrease volume by 2%</td>
    </tr>
    <tr>
        <td>Page Up</td>
        <td>Increase volume by 10%</td>
    </tr>
    <tr>
        <td>Page Down</td>
        <td>Decrease volume by 10%</td>
    </tr>
    <tr>
        <td>Home</td>
        <td>Set volume to 100%</td>
    </tr>
    <tr>
        <td>End</td>
        <td>Set volume to 10%</td>
    </tr>
</table>

</body>
</html>
